<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Math Racing - Kids Math Game</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="game-container">
    <!-- START SCREEN -->
    <div id="start-screen" class="screen active">
      <div class="start-content">
        <h1 class="game-title">🏎️ Math Racing</h1>
        <p class="subtitle">Learn math while racing!</p>
        <button id="start-btn" class="btn btn-primary btn-large">START GAME</button>
      </div>
      <div class="leaderboard-container">
        <h2>🏆 Top 10 Times (Avg/Q)</h2>
        <div class="leaderboard-list">
          <div class="leaderboard-header">
            <span>Date</span>
            <span>Name</span>
            <span title="Correct Answers">✓</span>
            <span title="Wrong Answers">✗</span>
            <span>Time</span>
            <span>Avg/Q</span>
          </div>
          <div id="leaderboard-rows">
            <!-- Leaderboard rows generated dynamically -->
          </div>
        </div>
        <button id="reset-leaderboard" class="btn btn-sm btn-secondary">Reset Top 10</button>
      </div>
    </div>

    <!-- SETUP SCREEN -->
    <div id="setup-screen" class="screen">
      <h2 class="screen-title">🏁 Race Setup</h2>
      
      <div class="setup-container">
        <div class="setup-section" style="display: flex; justify-content: space-between; align-items: center;">
          <div style="display: flex; flex-direction: column;">
            <h3>Number of Players</h3>
            <div class="player-count-buttons">
              <button class="btn btn-player-count active" data-count="1">1</button>
              <button class="btn btn-player-count" data-count="2">2</button>
              <button class="btn btn-player-count" data-count="3">3</button>
              <button class="btn btn-player-count" data-count="4">4</button>
            </div>
          </div>
          <button id="start-race" class="btn btn-primary" style="margin-top: 0;">Start Race! 🏁</button>
        </div>

        <div id="player-configs">
          <!-- Player configs generated dynamically -->
        </div>

        <div class="setup-section">
          <h3>Game Settings</h3>
          <div class="setting-row">
            <label>Speed:</label>
            <select id="speed-select">
              <option value="1">Level 1 (Slow)</option>
              <option value="2">Level 2</option>
              <option value="3">Level 3</option>
              <option value="4">Level 4</option>
              <option value="5" selected>Level 5 (Default)</option>
              <option value="6">Level 6</option>
              <option value="7">Level 7</option>
              <option value="8">Level 8</option>
              <option value="9">Level 9</option>
              <option value="10">Level 10 (Fast)</option>
            </select>
          </div>
          <div class="setting-row">
            <label>Number of Laps:</label>
            <select id="laps-select">
              <option value="3">3 Laps</option>
              <option value="5" selected>5 Laps</option>
              <option value="7">7 Laps</option>
              <option value="10">10 Laps</option>
            </select>
          </div>
          <div class="setting-row">
            <label>Track:</label>
            <select id="track-select">
              <option value="oval">Oval Circuit</option>
              <option value="island">Island Loop</option>
            </select>
          </div>
        </div>

        <div class="setup-buttons">
          <button id="back-to-start" class="btn btn-secondary">Back</button>
        </div>
      </div>
    </div>

    <!-- GAME SCREEN -->
    <div id="game-screen" class="screen">
      <div class="game-header">
        <div class="leader-display">
          <span class="leader-icon" style="font-size: 1.5rem;">👑 Leader: </span>
          <span id="leader-name" style="font-size: 1.5rem; font-weight: bold; margin-left: 5px;">-</span>
          <span id="leader-lap" style="font-size: 1.2rem; margin-left: 10px; color: #cbd5e1;">(Lap -)</span>
        </div>
        
        <div class="timer-display" style="font-size: 1.5rem; display: flex; align-items: center; gap: 20px;">
          <div>
            <span class="timer-icon">⏱️</span>
            <span id="game-timer">0:00</span>
          </div>
          <div id="header-player-name" style="font-size: 2rem; font-weight: bold; text-shadow: 2px 2px 0 #000;">Player 1</div>
        </div>
      </div>

      <div class="game-main">
        <div class="track-container">
          <!-- Countdown Overlay -->
          <div id="countdown-overlay" style="display:none; position:absolute; top:0; left:0; width:100%; height:100%; z-index:200; align-items:center; justify-content:center; background:rgba(15, 23, 42, 0.7); backdrop-filter:blur(5px);">
            <div id="countdown-text" style="font-size:200px; font-weight:900; color:var(--system-yellow); text-shadow:0 10px 30px rgba(0,0,0,0.8); animation: pulse 1s infinite;">3</div>
          </div>
          <canvas id="track-canvas"></canvas>
        </div>

        <div class="quiz-panel" id="quiz-panel">
          <div class="quiz-header" style="text-align: center; margin-bottom: 20px;">
            <!-- Player name moved to header -->
          </div>
          <div class="question-container">
            <div class="math-question" id="math-question">Get Ready!</div>
            <div class="answer-buttons" id="answer-buttons">
            </div>
          </div>
          <div class="feedback" id="quiz-feedback"></div>
        </div>
      </div>

      <div class="players-stats-bar" id="players-stats-bar">
        <!-- Stats generated dynamically -->
      </div>
    </div>

    <!-- RESULTS SCREEN -->
    <div id="results-screen" class="screen">
      <canvas id="fireworks-canvas" style="position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:500;"></canvas>
      <div class="results-content">
        <h2 class="results-title">🏆 Race Results</h2>
        
        <div class="podium-container" id="podium-container">
          <!-- Podium generated dynamically -->
        </div>

        <div class="results-table">
          <div class="results-header">
            <span>Rank</span>
            <span>Player</span>
            <span>Correct</span>
            <span>Wrong</span>
            <span>Accuracy</span>
          </div>
          <div id="results-rows">
            <!-- Results rows generated dynamically -->
          </div>
        </div>

        <div class="results-buttons">
          <button id="play-again" class="btn btn-primary btn-large">Play Again!</button>
          <button id="reset-game-btn" class="btn btn-primary btn-large">Restart Game</button>
          <button id="back-to-menu" class="btn btn-secondary">Main Menu</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="js/players.js"></script>
  <script src="js/quiz.js"></script>
  <script src="js/track.js"></script>
  <script src="js/game.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
